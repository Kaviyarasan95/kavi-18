<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IPL Quiz Challenge 🏏</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #F5A623;
    --orange: #E8431A;
    --deep: #0A0A0F;
    --surface: #13131C;
    --card: #1C1C2A;
    --border: rgba(245,166,35,0.2);
    --text: #F0EDE6;
    --muted: rgba(240,237,230,0.55);
    --correct: #2ECC71;
    --wrong: #E74C3C;
    --correct-bg: rgba(46,204,113,0.12);
    --wrong-bg: rgba(231,76,60,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow-x: hidden;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,67,26,0.18) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -15%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(245,166,35,0.13) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s ease both;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,166,35,0.12);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 10vw, 62px);
    line-height: 1;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #F5A623 0%, #E8431A 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--orange));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.45s ease both;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--orange));
    border-radius: 20px 20px 0 0;
  }
  .q-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 13px 16px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.15s;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    text-align: left;
    width: 100%;
  }
  .opt:hover:not(:disabled) {
    background: rgba(245,166,35,0.08);
    border-color: rgba(245,166,35,0.35);
    transform: translateX(4px);
  }
  .opt-label {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    transition: background 0.18s, border-color 0.18s;
    color: var(--muted);
  }
  .opt.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #2ECC71;
    transform: none;
  }
  .opt.correct .opt-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .opt.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #E74C3C;
    transform: none;
  }
  .opt.wrong .opt-label {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .opt:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; animation: fadeUp 0.3s ease both; }
  .feedback.correct { background: var(--correct-bg); color: #2ECC71; border-left: 3px solid var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); color: #E74C3C; border-left: 3px solid var(--wrong); }

  /* NEXT BUTTON */
  .next-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #fff;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 0.5rem;
    animation: fadeUp 0.3s ease both;
  }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn:active { transform: scale(0.98); }
  .next-btn.show { display: block; }

  /* RESULT */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.75rem;
    text-align: center;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--orange));
    border-radius: 20px 20px 0 0;
  }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .result-total { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1.5px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .result-msg { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }

  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    flex: 1;
    background: var(--surface);
    border-radius: 12px;
    padding: 12px 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.gold { color: var(--gold); }

  .action-row { display: flex; gap: 10px; }
  .btn-restart {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: rgba(245,166,35,0.08); }
  .btn-share {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-share:hover { opacity: 0.88; }

  .share-tag {
    margin-top: 1.25rem;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .share-tag span { color: var(--gold); }

  /* Stump decoration */
  .stumps-deco {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 22px;
    opacity: 0.55;
    letter-spacing: 4px;
    animation: fadeDown 0.5s 0.1s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    .q-text { font-size: 16px; }
    .q-card { padding: 1.25rem; }
    .result-card { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-badge">🏏 Season 2026</div>
    <h1>IPL Quiz</h1>
    <p>Test your Indian Premier League knowledge</p>
  </div>

  <div id="quiz-view">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="q-label">Question 1 of 10</span>
        <span id="score-label">Score: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Question 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQ()">Next Question →</button>
  </div>

  <div id="result-view" style="display:none">
    <div class="stumps-deco">| | |</div>
    <div class="result-card">
      <div class="result-emoji" id="r-emoji">🏆</div>
      <div class="result-score" id="r-score">0</div>
      <div class="result-total">out of 10</div>
      <div class="result-title" id="r-title">Well Played!</div>
      <div class="result-msg" id="r-msg"></div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-val green" id="r-correct">0</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-box">
          <div class="stat-val red" id="r-wrong">0</div>
          <div class="stat-lbl">Wrong</div>
        </div>
        <div class="stat-box">
          <div class="stat-val gold" id="r-pct">0%</div>
          <div class="stat-lbl">Accuracy</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-restart" onclick="restart()">Play Again</button>
        <button class="btn-share" onclick="shareScore()">Share Score 📲</button>
      </div>
      <div class="share-tag"><span>#IPLQuiz</span> &nbsp;•&nbsp; <span>#IPL2026</span> &nbsp;•&nbsp; <span>#CricketFans</span></div>
    </div>
  </div>
</div>

<script>
const questions = [
  { q: "Which team has won the most IPL titles?", opts: ["Chennai Super Kings", "Mumbai Indians", "Kolkata Knight Riders", "Royal Challengers Bengaluru"], ans: 1, fact: "Mumbai Indians have won 5 IPL titles — the most by any team." },
  { q: "Who holds the record for the most runs in a single IPL season?", opts: ["Virat Kohli", "David Warner", "Jos Buttler", "KL Rahul"], ans: 0, fact: "Virat Kohli scored 973 runs in IPL 2016 — the highest ever in a single season." },
  { q: "Who was the first-ever IPL Orange Cap holder?", opts: ["Shaun Marsh", "Matthew Hayden", "Adam Gilchrist", "Brendon McCullum"], ans: 0, fact: "Shaun Marsh of Kings XI Punjab won the first IPL Orange Cap in 2008." },
  { q: "Which bowler holds the record for most IPL wickets?", opts: ["Lasith Malinga", "Amit Mishra", "Dwayne Bravo", "Yuzvendra Chahal"], ans: 3, fact: "Yuzvendra Chahal surpassed Dwayne Bravo to become the all-time leading IPL wicket-taker." },
  { q: "In which city was the first-ever IPL match played?", opts: ["Mumbai", "Delhi", "Bangalore", "Chennai"], ans: 2, fact: "The first IPL match was played at M. Chinnaswamy Stadium, Bangalore on April 18, 2008." },
  { q: "What is the highest team total in IPL history?", opts: ["263/5", "277/16", "287/9", "257/4"], ans: 1, fact: "Sunrisers Hyderabad scored 277/16 against Mumbai Indians in IPL 2024 — the all-time record." },
  { q: "Who is the only player to have scored a century in an IPL final?", opts: ["Adam Gilchrist", "MS Dhoni", "Shane Watson", "Chris Gayle"], ans: 2, fact: "Shane Watson smashed 117* in the 2018 IPL final for CSK against SRH." },
  { q: "Which team won the inaugural IPL title in 2008?", opts: ["Chennai Super Kings", "Delhi Daredevils", "Rajasthan Royals", "Mumbai Indians"], ans: 2, fact: "Rajasthan Royals, led by Shane Warne, won the very first IPL championship in 2008." },
  { q: "Which player has won the most Man of the Match awards in IPL history?", opts: ["Rohit Sharma", "AB de Villiers", "Chris Gayle", "MS Dhoni"], ans: 2, fact: "Chris Gayle has won the most Man of the Match awards in IPL history." },
  { q: "Which is the world's largest cricket stadium that hosts IPL matches?", opts: ["Eden Gardens, Kolkata", "Wankhede, Mumbai", "Narendra Modi Stadium, Ahmedabad", "MA Chidambaram, Chennai"], ans: 2, fact: "The Narendra Modi Stadium in Ahmedabad has a capacity of over 1,30,000 — the world's largest." }
];

let current = 0, score = 0, answered = false;

const labels = ['A', 'B', 'C', 'D'];

function load() {
  const q = questions[current];
  document.getElementById('q-label').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('q-num').textContent = `Question ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('q-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span>${o}`;
    btn.onclick = () => choose(i);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn';
  nb.textContent = current === questions.length - 1 ? 'See My Result 🏆' : 'Next Question →';

  answered = false;

  // Re-trigger card animation
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function choose(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const isCorrect = idx === q.ans;
  if (isCorrect) score++;

  fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'} show`;
  fb.textContent = (isCorrect ? '✓ Correct! ' : '✗ Not quite. ') + q.fact;

  document.getElementById('score-label').textContent = `Score: ${score}`;

  const nb = document.getElementById('next-btn');
  nb.classList.add('show');
}

function nextQ() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    load();
  }
}

function showResult() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);

  let emoji, title, msg;
  if (score >= 9) { emoji = '🏆'; title = 'IPL Encyclopedia!'; msg = "You know IPL inside out. Are you secretly a team selector?"; }
  else if (score >= 7) { emoji = '🌟'; title = 'Super Fan!'; msg = "Excellent knowledge! You live and breathe cricket — respect."; }
  else if (score >= 5) { emoji = '🏏'; title = 'Solid Effort!'; msg = "A good showing. A few more matches to watch and you'll ace it."; }
  else if (score >= 3) { emoji = '📺'; title = 'Room to Grow!'; msg = "Keep watching IPL — the knowledge will come with every match!"; }
  else { emoji = '🥎'; title = 'Just Warming Up!'; msg = "No worries — every cricket fan starts somewhere. Try again!"; }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = questions.length - score;
  document.getElementById('r-pct').textContent = pct + '%';
}

function restart() {
  current = 0; score = 0; answered = false;
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  load();
}

function shareScore() {
  const pct = Math.round((score / questions.length) * 100);
  const text = `I scored ${score}/10 (${pct}%) on the IPL Quiz! 🏏🔥 Can you beat my score? #IPLQuiz #IPL2026 #CricketFans`;
  if (navigator.share) {
    navigator.share({ title: 'IPL Quiz Challenge', text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('Score copied! Paste it on Instagram 📋'));
  } else {
    alert(text);
  }
}

load();
</script>
</body>
</html>
